<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Public Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .drop-zone--over { 
            border-color: #6366f1 !important; 
            background-color: #f5f3ff !important;
            transform: scale(1.02);
        }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .loading-overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(255,255,255,0.8); 
            z-index: 100; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            backdrop-blur: 4px;
        }

        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 拡大縮小用のコンテナ設定 */
        .zoom-surface {
            touch-action: none;
            cursor: grab;
            transition: transform 0.1s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .zoom-surface:active { cursor: grabbing; }
        .zoom-image {
            max-width: 100%;
            max-height: 100%;
            user-select: none;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 pb-20">

    <div id="global-loader" class="loading-overlay hidden">
        <div class="flex flex-col items-center gap-3">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-600 border-t-transparent"></div>
            <p class="text-xs font-bold text-slate-500">処理中...</p>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[60] flex items-center justify-center p-6 hidden">
        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full text-center fade-in">
            <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="m9 12 2 2 4-4"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">投稿者認証</h2>
            <p class="text-slate-500 text-sm mb-8 leading-relaxed">写真を投稿するには、登録されているユーザー名でログインしてください。</p>
            <input type="text" id="login-input" placeholder="ユーザー名" class="w-full px-5 py-4 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none mb-4 text-lg">
            <div class="flex flex-col gap-3">
                <button onclick="handleLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold text-lg shadow-xl shadow-indigo-200 transition-all active:scale-[0.98]">
                    ログインする
                </button>
                <button onclick="showLoginModal(false)" class="text-slate-400 text-sm font-medium py-2">キャンセル</button>
            </div>
        </div>
    </div>

    <header class="bg-white/90 backdrop-blur-lg border-b border-slate-200 sticky top-0 z-30 h-14 shadow-sm">
        <div class="max-w-full mx-auto px-4 h-full flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-1.5 rounded-lg">
                    <svg class="text-white w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="7" height="7" x="3" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="14" rx="1"></rect><rect width="7" height="7" x="3" y="14" rx="1"></rect>
                    </svg>
                </div>
                <h1 class="text-sm font-black tracking-tighter text-slate-800 uppercase italic">Bulletin Board System</h1>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="loadPosts()" class="p-2 text-slate-400 active:bg-slate-100 rounded-full transition-colors">
                    <svg id="refresh-icon" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path>
                    </svg>
                </button>
                <div id="auth-header-btn">
                    <button onclick="showLoginModal(true)" class="text-xs font-bold bg-slate-100 text-slate-600 px-4 py-2 rounded-full">ログイン</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-full mx-auto px-2 py-4 sm:px-4 flex flex-col lg:flex-row gap-6">
        <!-- 左側：メインコンテンツ（投稿・ギャラリー） -->
        <div class="flex-1 min-w-0">
            <section id="upload-section" class="mb-6 hidden fade-in">
                <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden max-w-2xl mx-auto">
                    <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-white">
                        <h2 class="font-bold flex items-center gap-2 text-slate-800">
                            <svg class="w-5 h-5 text-indigo-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle>
                            </svg>
                            <span id="form-title">新規投稿</span>
                        </h2>
                        <button onclick="toggleUploadSection()" class="p-2 bg-slate-100 rounded-full text-slate-500 flex items-center justify-center">
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="p-5 space-y-5">
                        <div id="drop-zone" class="relative aspect-video group cursor-pointer border-2 border-dashed border-slate-200 rounded-2xl transition-all flex flex-col items-center justify-center bg-slate-50 overflow-hidden">
                            <input type="file" id="file-input" class="hidden" accept="image/*" capture="environment">
                            <div id="preview-container" class="hidden absolute inset-0 bg-white">
                                <img id="image-preview" class="w-full h-full object-contain" src="" alt="Preview">
                                <button onclick="resetImage(event)" class="absolute top-3 right-3 bg-slate-900/70 text-white p-2 rounded-full backdrop-blur-md z-10 flex items-center justify-center">
                                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    </svg>
                                </button>
                            </div>
                            <div id="drop-content" class="text-center p-4">
                                <div class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center mx-auto mb-3">
                                    <svg class="w-6 h-6 text-indigo-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7"></path><line x1="16" y1="5" x2="22" y2="5"></line><line x1="19" y1="2" x2="19" y2="8"></line><circle cx="9" cy="9" r="2"></circle><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path>
                                    </svg>
                                </div>
                                <p class="text-sm font-bold text-slate-700">写真を撮る・選ぶ・またはドロップ</p>
                                <p class="text-[10px] text-slate-400 mt-1">最大 2MB まで</p>
                            </div>
                        </div>
                        
                        <div class="space-y-4">
                            <div>
                                <p id="display-user-name" class="text-[10px] font-black text-indigo-600 uppercase mb-1 ml-1"></p>
                                <textarea id="comment-input" rows="3" placeholder="今何してる？" class="w-full px-4 py-3 text-[30px] font-bold bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500/20 outline-none resize-none placeholder:text-slate-300 leading-tight" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">掲示開始</label>
                                    <input type="date" id="start-date" class="w-full px-3 py-3 text-xs bg-slate-50 rounded-xl outline-none border-none">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">掲示終了</label>
                                    <input type="date" id="end-date" class="w-full px-3 py-3 text-xs bg-slate-50 rounded-xl outline-none border-none">
                                </div>
                            </div>
                            <button id="submit-btn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100 active:scale-[0.97] transition-all">
                                投稿を公開する
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="gallery-container">
                <div id="post-grid" class="grid grid-cols-2 md:grid-cols-[repeat(auto-fill,minmax(280px,1fr))] gap-3 sm:gap-6 justify-center"></div>
                <div id="empty-state" class="hidden py-32 text-center">
                    <div class="bg-white p-8 rounded-3xl shadow-sm inline-block">
                        <svg class="w-10 h-10 text-slate-200 mx-auto mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 20h20"></path><path d="M2 4h20"></path><path d="M10 8v8"></path><path d="M14 8v8"></path><path d="M6 8v8"></path><path d="M18 8v8"></path>
                        </svg>
                        <h3 class="text-slate-400 text-sm font-bold">表示できる投稿はありません</h3>
                    </div>
                </div>
            </section>
        </div>

        <!-- 右側：詳細パネル（PC用） -->
        <aside id="pc-side-panel" class="hidden lg:block shrink-0 sticky top-20 h-[calc(100vh-6rem)] relative bg-white rounded-3xl" style="width: 450px;">
            <!-- 幅調整用のリサイザー -->
            <div id="panel-resizer" class="absolute -left-4 top-0 bottom-0 w-8 cursor-col-resize group z-50 flex items-center justify-center">
                <div class="w-1 h-24 bg-slate-200 group-hover:bg-indigo-400 transition-colors rounded-full shadow-sm"></div>
            </div>
            <div id="pc-placeholder" class="h-full border-2 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center text-slate-400 bg-white">
            </div>
            <div id="pc-detail-view" class="hidden h-full bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col relative">
                <div class="absolute top-4 right-4 z-10 flex gap-2">
                    <div class="bg-slate-900/70 backdrop-blur px-2 py-1 rounded-lg border border-white/10">
                        <span id="side-zoom-indicator" class="text-white text-[10px] font-bold">100%</span>
                    </div>
                </div>
                <div id="side-zoom-container" class="zoom-surface flex-grow bg-slate-50">
                    <img id="side-lightbox-img" src="" alt="Side preview" class="zoom-image shadow-xl transition-transform duration-75 ease-out">
                </div>
                <div class="p-6 bg-white border-t border-slate-100">
                    <div class="overflow-hidden">
                        <p id="side-lightbox-comment" class="text-slate-800 text-[30px] font-bold leading-tight inline-block whitespace-nowrap"></p>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <button id="mobile-fab" onclick="toggleUploadSection()" class="hidden fixed bottom-6 right-6 w-16 h-16 bg-indigo-600 text-white rounded-full shadow-2xl flex items-center justify-center z-40 active:scale-90 transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>

    <!-- Lightbox -->
    <div id="lightbox" class="fixed inset-0 bg-black/95 z-[100] hidden flex flex-col overflow-hidden select-none">
        <!-- 操作用オーバーレイ -->
        <div class="absolute top-0 inset-x-0 p-4 flex justify-between items-center z-[120] pointer-events-none">
            <div class="bg-black/40 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/10">
                <span id="zoom-indicator" class="text-white text-[10px] font-bold tracking-widest">100%</span>
            </div>
            <button onclick="closeLightbox()" class="text-white bg-white/20 hover:bg-white/30 p-3 rounded-full pointer-events-auto backdrop-blur-md active:scale-90 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        
        <!-- ズーム・パン対象コンテナ -->
        <div id="zoom-container" class="zoom-surface flex-grow">
            <img id="lightbox-img" src="" alt="Full size" class="zoom-image shadow-2xl transition-transform duration-75 ease-out">
        </div>

        <!-- 下部情報パネル -->
        <div class="absolute bottom-0 inset-x-0 p-8 bg-gradient-to-t from-black/90 via-black/50 to-transparent pointer-events-none">
            <div class="max-w-4xl mx-auto text-center overflow-hidden">
                <!-- ユーザー名表示を削除 -->
                <div class="overflow-hidden">
                    <p id="lightbox-comment" class="text-white text-[30px] mt-2 font-bold leading-tight drop-shadow-lg inline-block whitespace-nowrap"></p>
                </div>
                <p class="text-white/40 text-[10px] mt-4 font-bold">スクロールまたはピンチで拡大縮小 / ドラッグで移動</p>
            </div>
        </div>
    </div>

    <script>
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz5lJlz9EU5b2rdfkWgCx6fPgLTcFJ1-5zcMu2rsDhwulaqAW0JLxHMp9sWP0CE3Hj1/exec'; 

        let currentUser = localStorage.getItem('gallery_user') || null;
        let selectedFile = null;
        let editingPostId = null;

        // ズーム・パンの状態管理
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startX, startY;
        let initialPinchDistance = null;

        window.onload = function() {
            initIcons();
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('start-date').value = today;
            loadPosts();
            if (currentUser) {
                checkPermission(currentUser, true);
            }
            initEventListeners();
            setupZoomHandlers('zoom-container', 'lightbox-img', 'zoom-indicator');
            setupZoomHandlers('side-zoom-container', 'side-lightbox-img', 'side-zoom-indicator');
            initSidePanelResizer();
        };

        function initIcons() {
            if (typeof lucide !== 'undefined') {
                requestAnimationFrame(() => {
                    lucide.createIcons();
                });
            }
        }

        function showLoginModal(show) {
            document.getElementById('login-modal').classList.toggle('hidden', !show);
            if(show) {
                setTimeout(initIcons, 10);
            }
        }

        async function handleLogin() {
            const input = document.getElementById('login-input').value.trim();
            if (!input) return;
            setLoading(true);
            await checkPermission(input, false);
            setLoading(false);
        }

        async function checkPermission(userId, silentCheck = false) {
            if (!GAS_WEB_APP_URL) {
                if(!silentCheck) alert('GAS URLが未設定です。');
                return;
            }
            try {
                const res = await fetch(`${GAS_WEB_APP_URL}?action=getWhitelist`);
                const whitelist = await res.json();
                if (whitelist.includes(userId)) {
                    currentUser = userId;
                    localStorage.setItem('gallery_user', userId);
                    updateAuthUI(true);
                    showLoginModal(false);
                    loadPosts();
                } else {
                    if(!silentCheck) showMessage('アクセス権限がありません', 'error');
                    logout(false);
                }
            } catch (err) { 
                if(!silentCheck) showMessage('認証エラーが発生しました', 'error'); 
            }
        }

        function updateAuthUI(isLoggedIn) {
            const fab = document.getElementById('mobile-fab');
            const authBtnContainer = document.getElementById('auth-header-btn');
            const displayName = document.getElementById('display-user-name');

            if (isLoggedIn) {
                fab.classList.remove('hidden');
                if (displayName) displayName.textContent = `@${currentUser}`;
                authBtnContainer.innerHTML = `<button onclick="logout()" class="text-xs font-bold bg-red-50 text-red-600 px-4 py-2 rounded-full flex items-center gap-2 transition-colors active:bg-red-100"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>ログアウト</button>`;
            } else {
                fab.classList.add('hidden');
                if (displayName) displayName.textContent = '';
                authBtnContainer.innerHTML = `<button onclick="showLoginModal(true)" class="text-xs font-bold bg-slate-100 text-slate-600 px-4 py-2 rounded-full">ログイン</button>`;
            }
            initIcons();
        }

        function logout(confirmNeeded = true) {
            if(confirmNeeded && !confirm('ログアウトしますか？')) return;
            localStorage.removeItem('gallery_user');
            editingPostId = null;
            currentUser = null;
            updateAuthUI(false);
            document.getElementById('upload-section').classList.add('hidden');
            loadPosts();
        }

        function toggleUploadSection() { 
            if (!currentUser) {
                showLoginModal(true);
                return;
            }
            const section = document.getElementById('upload-section');
            if (section.classList.contains('hidden')) {
                // 画面を開くとき：編集IDがない（新規投稿ボタン経由）ならフォームをリセット
                if (!editingPostId) {
                    resetForm();
                }
                section.classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                setTimeout(initIcons, 10);
            } else {
                // 画面を閉じるとき：状態を残さないようリセットしてから閉じる
                section.classList.add('hidden');
                resetForm();
            }
        }

        function initMarquee(el) {
            if (!el) return;
            const container = el.parentElement;
            const distance = el.scrollWidth - container.offsetWidth;
            
            // 既存のアニメーションをクリア
            el.getAnimations().forEach(anim => anim.cancel());
            el.style.transform = 'translateX(0)';

            if (distance <= 0) return;

            const scrollSpeed = 50; // 秒間50px
            const scrollTime = (distance / scrollSpeed) * 1000;
            const pauseTime = 10000; // 10秒
            const totalTime = pauseTime + scrollTime + pauseTime;

            el.animate([
                { transform: 'translateX(0)', offset: 0 },
                { transform: 'translateX(0)', offset: pauseTime / totalTime },
                { transform: 'translateX(-' + distance + 'px)', offset: (pauseTime + scrollTime) / totalTime },
                { transform: 'translateX(-' + distance + 'px)', offset: 1 }
            ], {
                duration: totalTime,
                iterations: Infinity,
                easing: 'linear'
            });
        }

        function initEventListeners() {
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');
            
            dropZone.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });

            ['dragover', 'dragenter'].forEach(eventName => {
                dropZone.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dropZone.classList.add('drop-zone--over');
                });
            });

            ['dragleave', 'dragend', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dropZone.classList.remove('drop-zone--over');
                });
            });

            dropZone.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                if (files.length) {
                    handleFile(files[0]);
                }
            });

            document.getElementById('submit-btn').addEventListener('click', handleSubmit);
            
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeLightbox();
            });
        }

        function initSidePanelResizer() {
            const resizer = document.getElementById('panel-resizer');
            const sidePanel = document.getElementById('pc-side-panel');
            let isResizing = false;

            resizer.addEventListener('mousedown', (e) => {
                isResizing = true;
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });

            window.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const rect = sidePanel.getBoundingClientRect();
                const newWidth = rect.right - e.clientX;
                
                // 最小300px、最大は画面幅の70%までに制限
                if (newWidth > 300 && newWidth < window.innerWidth * 0.7) {
                    sidePanel.style.width = `${newWidth}px`;
                    // 幅が変わったのでマーキーを再計算
                    const commentEl = document.getElementById('side-lightbox-comment');
                    if (commentEl) initMarquee(commentEl);
                }
            });

            window.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });
        }

        function setupZoomHandlers(containerId, imgId, indicatorId) {
            const container = document.getElementById(containerId);
            const img = document.getElementById(imgId);

            const applyTransform = () => {
                img.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
                document.getElementById(indicatorId).textContent = `${Math.round(scale * 100)}%`;
            };

            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = -e.deltaY;
                const zoomFactor = 1.1;
                if (delta > 0) scale *= zoomFactor;
                else scale /= zoomFactor;
                
                scale = Math.min(Math.max(0.5, scale), 10);
                applyTransform();
            }, { passive: false });

            container.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                translateX = e.clientX - startX;
                translateY = e.clientY - startY;
                applyTransform();
            });

            window.addEventListener('mouseup', () => { isDragging = false; });

            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    isDragging = true;
                    startX = e.touches[0].clientX - translateX;
                    startY = e.touches[0].clientY - translateY;
                } else if (e.touches.length === 2) {
                    initialPinchDistance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                }
            });

            container.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length === 1 && isDragging) {
                    translateX = e.touches[0].clientX - startX;
                    translateY = e.touches[0].clientY - startY;
                } else if (e.touches.length === 2) {
                    const currentDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    if (initialPinchDistance) {
                        const zoomFactor = currentDist / initialPinchDistance;
                        scale *= zoomFactor;
                        scale = Math.min(Math.max(0.5, scale), 10);
                        initialPinchDistance = currentDist;
                    }
                }
                applyTransform();
            }, { passive: false });

            container.addEventListener('touchend', () => {
                isDragging = false;
                initialPinchDistance = null;
            });

            container.addEventListener('dblclick', () => {
                if (scale > 1.1) {
                    scale = 1; translateX = 0; translateY = 0;
                } else {
                    scale = 2.5;
                }
                applyTransform();
            });
        }

        function handleFile(file) {
            if (!file.type.startsWith('image/')) return showMessage('画像のみ選択できます', 'error');
            if (file.size > 2 * 1024 * 1024) return showMessage('2MB以下にしてください', 'error');
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('preview-container').classList.remove('hidden');
                document.getElementById('drop-content').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        function resetImage(e) {
            if (e) e.stopPropagation();
            selectedFile = null;
            document.getElementById('image-preview').src = "";
            document.getElementById('preview-container').classList.add('hidden');
            document.getElementById('drop-content').classList.remove('hidden');
            document.getElementById('file-input').value = "";
        }

        async function handleSubmit() {
            const comment = document.getElementById('comment-input').value.trim();
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;
            const imageData = document.getElementById('image-preview').src;

            if (!imageData || !comment || !startDate) return showMessage('未入力の項目があります', 'error');
            
            setLoading(true);
            const action = editingPostId ? 'update' : 'add';
            const post = {
                id: editingPostId || crypto.randomUUID(), 
                userName: currentUser, 
                comment,
                imageData: imageData,
                timestamp: Date.now(), likes: 0, startDate, endDate: endDate || '9999-12-31'
            };
            try {
                const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action, post }) });
                const result = await res.json();
                if (result.status === 'success') {
                    showMessage(editingPostId ? '更新しました' : '投稿しました', 'success');
                    resetForm(); toggleUploadSection(); loadPosts();
                } else { showMessage(result.message, 'error'); }
            } catch (err) { showMessage('送信に失敗しました', 'error'); }
            finally { setLoading(false); }
        }

        function resetForm() {
            document.getElementById('comment-input').value = "";
            document.getElementById('end-date').value = "";
            resetImage();
            editingPostId = null;
            document.getElementById('form-title').textContent = "新規投稿";
            document.getElementById('submit-btn').textContent = "投稿を公開する";
        }

        async function loadPosts() {
            if (!GAS_WEB_APP_URL) return;
            const refreshIcon = document.getElementById('refresh-icon');
            refreshIcon.classList.add('animate-spin');
            try {
                const res = await fetch(GAS_WEB_APP_URL);
                const posts = await res.json();
                const todayStr = new Date().toISOString().split('T')[0];
                const activePosts = posts.filter(p => {
                    const start = p.startDate || '0000-00-00';
                    const end = p.endDate || '9999-12-31';
                    // ログインしている場合は掲載開始前の項目も表示する
                    const isStarted = todayStr >= start;
                    const isNotExpired = todayStr <= end;
                    return isNotExpired && (currentUser ? true : isStarted);
                });
                renderPosts(activePosts.sort((a, b) => b.timestamp - a.timestamp));
            } catch (err) { showMessage('読み込みに失敗しました', 'error'); }
            finally { refreshIcon.classList.remove('animate-spin'); }
        }

        function renderPosts(posts) {
            const grid = document.getElementById('post-grid');
            const emptyState = document.getElementById('empty-state');
            const todayStr = new Date().toISOString().split('T')[0];
            grid.innerHTML = "";
            if (posts.length === 0) { emptyState.classList.remove('hidden'); return; }
            emptyState.classList.add('hidden');
            posts.forEach(post => {
                // 投稿者と現在のユーザーが一致するかチェック（空白削除・小文字化して比較）
                const isOwner = currentUser && post.userName && post.userName.trim().toLowerCase() === currentUser.trim().toLowerCase();
                
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl overflow-hidden shadow-sm flex flex-col group active:scale-95 transition-all h-fit fade-in";
                const postData = btoa(unescape(encodeURIComponent(JSON.stringify(post))));
                card.innerHTML = `
                    <div class="relative aspect-square bg-slate-100 overflow-hidden cursor-pointer" onclick="openLightboxFromBase64('${postData}')">
                        <img src="${post.imageData}" class="w-full h-full object-cover" loading="lazy">
                    </div>
                    <div class="p-3">
                        <div class="flex justify-between items-center mb-1">
                            ${post.startDate > todayStr ? '<span class="text-[9px] font-black text-indigo-600 bg-indigo-50 px-1.5 py-0.5 rounded-md">予約中</span>' : '<span></span>'}
                            <span class="text-[9px] text-slate-300 shrink-0 italic">${post.endDate === '9999-12-31' ? 'ALWAYS' : post.endDate.slice(5)}</span>
                        </div>
                        <div class="overflow-hidden">
                            <p class="marquee-target text-[30px] font-bold text-slate-800 leading-[1.1] tracking-tighter whitespace-nowrap inline-block">${post.comment}</p>
                        </div>
                        <div class="flex justify-between items-center mt-3 pt-2 border-t border-slate-50">
                            <button onclick="handleLike('${post.id}')" class="text-slate-300 hover:text-pink-500 flex items-center gap-1 active:scale-125 transition-transform">
                                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.84-8.84 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                                <span class="text-[10px] font-bold">${post.likes}</span>
                            </button>
                            ${isOwner ? `
                                <div class="flex gap-1">
                                    <button onclick="editPost('${postData}')" class="text-slate-300 hover:text-indigo-600 p-1">
                                        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
                                        </svg>
                                    </button>
                                    <button onclick="deletePost('${post.id}')" class="text-slate-300 hover:text-red-500 p-1">
                                        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                            <polyline points="3 6 5 6 21 6"></polyline>
                                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                            <line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line>
                                        </svg>
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            grid.querySelectorAll('.marquee-target').forEach(el => initMarquee(el));
            initIcons();
        }

        function editPost(base64) {
            const post = JSON.parse(decodeURIComponent(escape(atob(base64))));
            editingPostId = post.id;
            
            document.getElementById('comment-input').value = post.comment;
            document.getElementById('start-date').value = post.startDate;
            document.getElementById('end-date').value = post.endDate === '9999-12-31' ? '' : post.endDate;
            
            const preview = document.getElementById('image-preview');
            preview.src = post.imageData;
            document.getElementById('preview-container').classList.remove('hidden');
            document.getElementById('drop-content').classList.add('hidden');
            
            toggleUploadSection();
            document.getElementById('form-title').textContent = "投稿を編集";
            document.getElementById('submit-btn').textContent = "投稿を更新する";
        }

        async function handleLike(id) { try { await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'like', id }) }); loadPosts(); } catch (err) {} }
        async function deletePost(id) {
            if (confirm('この投稿を削除しますか？')) {
                setLoading(true);
                try {
                    const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id }) });
                    const result = await res.json();
                    if (result.status === 'success') {
                        showMessage('削除しました', 'success');
                        loadPosts();
                    } else { showMessage(result.message || '削除に失敗しました', 'error'); }
                } catch (err) { showMessage('通信エラーが発生しました', 'error'); }
                finally { setLoading(false); }
            }
        }

        window.openLightboxFromBase64 = (base64) => {
            const post = JSON.parse(decodeURIComponent(escape(atob(base64))));
            openLightbox(post);
        };

        window.openLightbox = (post) => {
            const isPC = window.innerWidth >= 1024;
            
            scale = 1; translateX = 0; translateY = 0;

            if (isPC) {
                // PC表示: サイドパネルを更新
                document.getElementById('pc-placeholder').classList.add('hidden');
                const detailView = document.getElementById('pc-detail-view');
                detailView.classList.remove('hidden');
                
                const img = document.getElementById('side-lightbox-img');
                img.src = post.imageData;
                img.style.transform = `translate(0px, 0px) scale(1)`;
                document.getElementById('side-zoom-indicator').textContent = '100%';

                const commentEl = document.getElementById('side-lightbox-comment');
                commentEl.textContent = post.comment;
                setTimeout(() => initMarquee(commentEl), 50);
                return;
            }

            // スマホ表示: モーダルを更新
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = post.imageData;
            img.style.transform = `translate(0px, 0px) scale(1)`;
            document.getElementById('zoom-indicator').textContent = '100%';

            // コメントのみ設定
            const commentEl = document.getElementById('lightbox-comment');
            commentEl.textContent = post.comment;
            lb.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            initIcons();
            setTimeout(() => initMarquee(commentEl), 50);
        };
        
        window.closeLightbox = () => { 
            const lb = document.getElementById('lightbox');
            lb.classList.add('hidden'); 
            document.body.style.overflow = ''; 
        };

        function setLoading(isLoading) { document.getElementById('global-loader').classList.toggle('hidden', !isLoading); }
        function showMessage(text, type) {
            const box = document.createElement('div');
            box.className = `fixed bottom-24 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl text-xs text-white font-bold z-[100] transition-all shadow-2xl fade-in ${type === 'error' ? 'bg-red-500' : 'bg-slate-800'}`;
            box.textContent = text;
            document.body.appendChild(box);
            setTimeout(() => { box.style.opacity = '0'; box.style.transform = 'translate(-50%, 20px)'; setTimeout(() => box.remove(), 500); }, 2500);
        }
    </script>
</body>
